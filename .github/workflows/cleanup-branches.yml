name: Cleanup submission branches

on:
  pull_request:
    types: [closed]  # fires on both merge and close-without-merge

jobs:
  delete-branch:
    # Only run on the auto-generated submission branches
    if: startsWith(github.head_ref, 'submission-')
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to delete the branch

    steps:
      - name: Delete submission branch
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const merged = context.payload.pull_request.merged;
            console.log(`PR ${merged ? 'merged' : 'closed'} — deleting branch: ${branch}`);
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                ref:   `heads/${branch}`,
              });
              console.log(`✓ Deleted ${branch}`);
            } catch (e) {
              console.log(`Branch already deleted or not found: ${e.message}`);
            }
