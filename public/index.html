<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atlas</title>
    
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://unpkg.com/force-graph"></script>
    
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>
<body>
    <div id="graph-container"></div>

    <div id="search-container">
        <input type="text" id="search-input" placeholder="Search atlas..." autocomplete="off">
        <ul id="search-results"></ul>
    </div>
    
    <aside id="side-panel">
        <header id="panel-header">
            <span id="node-badge">Type</span>
            <button id="close-panel-btn" aria-label="Close panel">&times;</button>
        </header>
        
	<div id="panel-content">
            <h2 id="node-title">Node Title</h2>
            <p class="meta-id">ID: <span id="node-id"></span></p>
            
            <div id="panel-actions">
                <button id="btn-copy" class="action-btn">Copy Typst</button>
                <button id="btn-download" class="action-btn">Download PDF</button>
            </div>

            <div id="panel-tabs" class="tabs-nav">
                <button class="tab-btn active" data-target="tab-math">Rendered</button>
                <button class="tab-btn" data-target="tab-source">Source</button>
                <button class="tab-btn" data-target="tab-meta">Dependencies</button>
            </div>
            
            <div id="tab-math" class="tab-pane active">
                <img id="node-math-image" src="" alt="Math content">
                <p id="node-placeholder">Loading...</p>
            </div>

            <div id="tab-source" class="tab-pane">
                <pre><code id="node-raw-code"></code></pre>
            </div>

            <div id="tab-meta" class="tab-pane">
                <h3>Requires:</h3>
                <ul id="node-dependencies" class="deps-list"></ul>
            </div>
        </div>           
    </aside>

    <div id="global-footer">
        <a href="submit.html" id="contribute-btn">Contribute a Node</a>
    </div>
</body>
</html>
